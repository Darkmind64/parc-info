name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: ParcInfo-Windows.exe
            target_arch: ''
          - os: macos-latest
            asset_name: ParcInfo-macOS.zip
            target_arch: 'universal2'

    runs-on: ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 (Windows / macOS ARM-only)
        if: runner.os != 'macOS' || matrix.target_arch == ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python 3.11 universal2 (macOS universal2 via python.org pkg)
        if: runner.os == 'macOS' && matrix.target_arch == 'universal2'
        run: |
          curl -fsSL -o /tmp/python311.pkg \
            https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg
          sudo installer -pkg /tmp/python311.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.11/bin" >> $GITHUB_PATH

      - name: Dépendances
        run: |
          pip3.11 install --upgrade pip || pip install --upgrade pip
          pip3.11 install -r requirements.txt pyinstaller pillow pystray || \
          pip install -r requirements.txt pyinstaller pillow pystray

      - name: Build PyInstaller
        run: pyinstaller parcinfo.spec
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          TARGET_ARCH: ${{ matrix.target_arch }}

      - name: Zip .app (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ${{ matrix.asset_name }} ParcInfo.app

      - name: Rename exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item dist\ParcInfo.exe ParcInfo-Windows.exe

      - name: Upload artefact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/ParcInfo-Windows.exe

      - name: Upload artefact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            darkmind64/parcinfo:latest
            darkmind64/parcinfo:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Télécharger artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: ParcInfo ${{ github.ref_name }}
          body: |
            ## ParcInfo ${{ github.ref_name }}

            ### Téléchargements
            | Plateforme | Fichier |
            |-----------|---------|
            | Windows   | `ParcInfo-Windows.exe` |
            | macOS (Intel + Apple Silicon) | `ParcInfo-macOS.zip` → dézipper → `ParcInfo.app` |
            | Docker    | `docker pull darkmind64/parcinfo:${{ github.ref_name }}` |

            ### Docker
            ```bash
            docker pull darkmind64/parcinfo:latest
            docker run -d -p 5010:5000 darkmind64/parcinfo:latest
            # → http://localhost:5010
            ```
            Ou avec docker-compose (voir `docker-compose.yml` dans le repo).

            ### Installation macOS
            Si macOS bloque l'application (non signée) :
            ```bash
            xattr -cr ParcInfo.app
            ```
          files: |
            artifacts/ParcInfo-Windows.exe/ParcInfo-Windows.exe
            artifacts/ParcInfo-macOS.zip/ParcInfo-macOS.zip
