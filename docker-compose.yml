version: '3'

services:
  parcinfo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parcinfo-app
    restart: unless-stopped
    ports:
      - "5010:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Paris
    volumes:
      - parcinfo-db:/app
      - parcinfo-uploads:/app/uploads
      - parcinfo-backups:/data/backups
      - parcinfo-config:/data/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  parcinfo-db:
    driver: local
  parcinfo-uploads:
    driver: local
  parcinfo-backups:
    driver: local
  parcinfo-config:
    driver: local
