version: '3.8'

services:
  parcinfo:
    image: darkmind64/parcinfo:latest
    container_name: parcinfo-app
    restart: unless-stopped
    ports:
      - "5010:5000"
    environment:
      - FLASK_DEBUG=0
      - PYTHONUNBUFFERED=1
      - RUNNING_IN_DOCKER=1
      - DATA_DIR=/data
      - TZ=Europe/Paris
    volumes:
      # Bind mount vers un dossier NAS accessible — modifie le chemin gauche selon ton NAS
      # Synology : /volume1/docker/parcinfo
      # Linux    : /opt/parcinfo/data
      - /volume1/docker/parcinfo:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
