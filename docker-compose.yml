# ─────────────────────────────────────────────────────────────────────────────
# ParcInfo — docker-compose.yml
# Compatible : Synology Container Manager (DSM 7.2+)
#
# AVANT LE PREMIER DÉMARRAGE :
#   1. Créer le dossier de données sur votre NAS :
#      /volume1/docker/parcinfo/data/
#   2. Générer une SECRET_KEY sécurisée :
#      python3 -c "import secrets; print(secrets.token_hex(32))"
#   3. Remplacer CHANGE_ME_USE_A_STRONG_RANDOM_KEY ci-dessous
#   4. docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  parcinfo:
    build:
      context: .
      dockerfile: Dockerfile
    image: parcinfo:latest
    container_name: parcinfo
    restart: unless-stopped

    ports:
      # HOST_PORT:CONTAINER_PORT — modifier le port hôte si 5000 est déjà pris
      - "5000:5000"

    volumes:
      # Données persistantes (DB, uploads, secret.key)
      # Synology : /volume1/docker/parcinfo/data
      # Linux    : ./data  (développement local)
      - /volume1/docker/parcinfo/data:/data

    environment:
      # Chemins internes du conteneur (ne pas modifier)
      DATABASE_PATH: /data/parc_info.db
      UPLOAD_PATH: /data/uploads

      # OBLIGATOIRE — remplacer par une clé aléatoire de 64 caractères hex
      # Générer : python3 -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: CHANGE_ME_USE_A_STRONG_RANDOM_KEY

      # Port d'écoute Flask (doit correspondre au mapping ports: ci-dessus)
      PORT: "5000"
      HOST: "0.0.0.0"

      # Désactivé en production — mettre "true" uniquement pour déboguer
      FLASK_DEBUG: "false"

    # Réseau isolé (recommandé Synology)
    networks:
      - parcinfo-net

    # Ressources (optionnel — adapter selon votre NAS)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #     reservations:
    #       memory: 128M

networks:
  parcinfo-net:
    driver: bridge
