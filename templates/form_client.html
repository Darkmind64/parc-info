{% extends "base.html" %}
{% block title %}{{ action }} client — ParcInfo{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ action }} un <span>Client</span></h1>
    <p>Informations de contact et identification du client</p>
</div>

<form method="POST" style="max-width: 860px;">
    <div class="form-section">
        <div class="form-section-title">&#9632; Identification</div>
        <div class="form-row cols-2">
            <div class="form-group">
                <label>Nom du client / Entreprise *</label>
                <input type="text" name="nom" value="{{ client.nom if client else '' }}"
                       placeholder="Ex: Mairie de Lyon" required>
            </div>
            <div class="form-group">
                <label>Couleur d'identification</label>
                <div style="display:flex; gap:0.6rem; align-items:center;">
                    <input type="color" name="couleur" value="{{ client.couleur if client else '#00c9ff' }}"
                           style="width:60px; flex-shrink:0;">
                    <span style="font-size:0.8rem; color:var(--text-secondary);">
                        Couleur affichée dans la barre de sélection rapide
                    </span>
                </div>
            </div>
        </div>
        <div class="form-row cols-3">
            <div class="form-group">
                <label>Contact principal</label>
                <input type="text" name="contact" value="{{ client.contact if client else '' }}"
                       placeholder="Nom du responsable">
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" name="telephone" value="{{ client.telephone if client else '' }}"
                       placeholder="Ex: 04 72 00 00 00">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ client.email if client else '' }}"
                       placeholder="contact@client.fr">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Adresse</label>
                <input type="text" name="adresse" value="{{ client.adresse if client else '' }}"
                       placeholder="Adresse complète">
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-section-title">&#9632; Notes</div>
        <div class="form-group">
            <textarea name="notes" rows="4"
                      placeholder="Informations complémentaires sur ce client...">{{ client.notes if client else '' }}</textarea>
        </div>
    </div>

    <div style="display:flex; gap:1rem;">
        <button type="submit" class="btn btn-success">&#10003; {{ action }} le client</button>
        <a href="/clients" class="btn btn-primary">← Retour</a>
    </div>
</form>
{% endblock %}
